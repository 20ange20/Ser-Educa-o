<script type:"module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,   
  updateDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { 
  getAuth 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const db = getFirestore();

 async function atualizarContadores() {
  const snap = await getDocs(collection(db, "comentarios"));

  let contagem = {};

  snap.forEach(doc => {
    const c = doc.data();

    if (!c.paginaId) return;

    contagem[c.paginaId] = (contagem[c.paginaId] || 0) + 1;
  });

  console.log("Contagem:", contagem);

  document.querySelectorAll(".coment-info").forEach(el => {
    const id = el.dataset.id?.trim(); // remove espaço

    const span = el.querySelector(".contador");

    if (span) {
      span.innerText = contagem[id] || 0;
    }
  });
}

window.addEventListener("load", atualizarContadores);
</script>
