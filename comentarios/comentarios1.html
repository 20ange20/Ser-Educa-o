<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ser Educação</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../img/icone.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <img src="./img/logoheader.png" alt="Ser Educação" class="logo">
    </header>
    <nav>
    <a href="../index.html">Início</a>
<a href="../artigos.html">Artigos</a>
    </nav>
    <br>
    <br>


  
<section class="comentarios-box">
<br> <center>
  <h2>Comentários</h2>
  
<br>

  <!-- LOGIN -->
 <button onclick="login()" class="google-btn">
  <img src="https://developers.google.com/identity/images/g-logo.png">
  Entrar com Google
</button>
</center>

  <!-- ÁREA DO USUÁRIO (inicialmente escondida) -->
  <div id="areaUsuario" style="display:none;">

    <div class="usuario-logado">
      <img id="userFoto">
      <span id="userNome"></span>
    </div>

    <textarea id="comentario" placeholder="Escreva um comentário..."></textarea>
    <button onclick="comentar()" class="btn-enviar">Enviar</button>

  </div>

  <div id="lista"></div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, collection, addDoc, getDocs, updateDoc, doc, getDoc, deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJZf8Eqq8wiyiUT4YmyTfoOdh9cHrxAP0",
  authDomain: "ser-educacao-e8001.firebaseapp.com",
  projectId: "ser-educacao-e8001",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const provider = new GoogleAuthProvider();

let usuario = null;


// 🔐 DETECTAR LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    usuario = user;

    document.querySelector(".google-btn").style.display = "none";
    document.getElementById("areaUsuario").style.display = "block";

    document.getElementById("userNome").innerText = user.displayName;
    document.getElementById("userFoto").src = user.photoURL;
  }
});


// LOGIN
window.login = async function() {
  await signInWithPopup(auth, provider);
}


// COMENTAR
window.comentar = async function() {
  const texto = document.getElementById("comentario").value;

  if (!usuario) return alert("Faça login");

  await addDoc(collection(db, "comentarios"), {
    texto,
    nome: usuario.displayName,
    foto: usuario.photoURL,
    userId: usuario.uid,
    likes: [],
    data: new Date()
  });

  document.getElementById("comentario").value = "";
  carregar();
}


// 👍 LIKE (1 por usuário)
window.like = async function(id) {
  if (!usuario) return alert("Faça login");

  const ref = doc(db, "comentarios", id);
  const snap = await getDoc(ref);
  let dados = snap.data();

  let likes = dados.likes;

  // 🔥 Corrigir dados antigos (número → array)
  if (!Array.isArray(likes)) {
    likes = [];
  }

  if (likes.includes(usuario.uid)) {
    likes = likes.filter(uid => uid !== usuario.uid);
  } else {
    likes.push(usuario.uid);
  }

  await updateDoc(ref, { likes });
  carregar();
}

// ✏️ EDITAR
window.editar = function(id, textoAtual) {
  const div = document.getElementById("editar-" + id);

  div.innerHTML = `
    <textarea id="edit-texto-${id}">${textoAtual}</textarea>
    <button onclick="salvarEdicao('${id}')">Salvar</button>
  `;
}

//funcao salvar
window.salvarEdicao = async function(id) {
  const novoTexto = document.getElementById(`edit-texto-${id}`).value;

  if (!novoTexto) return;

  await updateDoc(doc(db, "comentarios", id), {
    texto: novoTexto
  });

  carregar();
}

// 🗑️ EXCLUIR
window.excluir = async function(id) {
  if (!confirm("Excluir comentário?")) return;

  await deleteDoc(doc(db, "comentarios", id));
  carregar();
}


// 💬 ABRIR RESPOSTA
window.abrirResposta = function(id) {
  document.getElementById("resposta-" + id).innerHTML = `
    <textarea id="resp-${id}"></textarea>
    <button onclick="enviarResposta('${id}')">Enviar</button>
  `;
}


// ENVIAR RESPOSTA
window.enviarResposta = async function(id) {
  const texto = document.getElementById("resp-" + id).value;

  await addDoc(collection(db, "respostas"), {
    comentarioId: id,
    texto,
    nome: usuario.displayName,
    foto: usuario.photoURL
  });

  carregar();
}


// 🔄 CARREGAR
async function carregar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const comentarios = await getDocs(collection(db, "comentarios"));
  const respostas = await getDocs(collection(db, "respostas"));

  comentarios.forEach((docSnap) => {
    const c = docSnap.data();
    const id = docSnap.id;

    let html = `
      <div class="comentario">
        <div class="usuario">
          <img src="${c.foto}">
          <strong>${c.nome}</strong>
        </div>

        <p>${c.texto}</p>
<div id="editar-${id}"></div>
        <div class="acoes">
         <button onclick="like('${id}')">
  <img src="../img/iconesc/curtir.png" class="icone">
  ${Array.isArray(c.likes) ? c.likes.length : 0}
</button>
    `;

    // 👇 MOSTRAR SÓ PRO DONO
    if (usuario && usuario.uid === c.userId) {
      html += `
       <button onclick="editar('${id}', \`${c.texto}\`)">
  <img src="../img/iconesc/editar.png" class="icone">
</button>
        <button onclick="excluir('${id}')">
  <img src="../img/iconesc/excluir.png" class="icone">
</button>
      `;
    }

    html += `
        </div>

        <div id="resposta-${id}"></div>
        <div class="respostas">
    `;

    respostas.forEach((rSnap) => {
      const r = rSnap.data();

      if (r.comentarioId === id) {
        html += `
          <div class="usuario">
            <img src="${r.foto}">
            <small><b>${r.nome}</b>: ${r.texto}</small>
          </div>
        `;
      }
    });

    html += `</div></div>`;
    lista.innerHTML += html;
  });
}

carregar();

</script>
</body>
