<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ser Educação</title>
  <link rel="stylesheet" href="/Ser-Educa-o/css/style.css">
  <link rel="icon" href="/Ser-Educa-o/img/icone.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>
  <header>
     <img src="img/logoheader.png" alt="Ser Educação" class="logo">
  </header>
  <nav>
    <div class="links"><a href="index.html">Início</a>
      <a href="artigos.html" class="link-artigo">Artigos</a>

    </div>
  </nav>

  
<section class="comentarios-box">

  <h3>Comentários</h3>
  

  <!-- LOGIN -->
 <button onclick="login()" class="google-btn">
  <img src="https://developers.google.com/identity/images/g-logo.png">
  Entrar com Google
</button>

  <!-- ÁREA DO USUÁRIO (inicialmente escondida) -->
  <div id="areaUsuario" style="display:none;">

    <div class="usuario-logado">
      <img id="userFoto">
      <span id="userNome"></span>
    </div>

    <textarea id="comentario" placeholder="Escreva um comentário..."></textarea>
    <button onclick="comentar()">Enviar</button>

  </div>

  <div id="lista"></div>

</section>
<script type="module">

// 🔥 IMPORTS COMPLETOS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  signInWithPopup, 
  GoogleAuthProvider, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  updateDoc, 
  doc, 
  increment 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// 🔑 CONFIG (coloque a sua)
const firebaseConfig = {
apiKey: "AIzaSyBJZf8Eqq8wiyiUT4YmyTfoOdh9cHrxAP0",
  authDomain: "ser-educacao-e8001.firebaseapp.com",
  projectId: "ser-educacao-e8001",
};


// 🚀 INICIAR FIREBASE
const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const provider = new GoogleAuthProvider();

let usuario = null;


// ✅ DETECTAR USUÁRIO LOGADO
onAuthStateChanged(auth, (user) => {
  if (user) {
    console.log("Já logado:", user);

    usuario = user;

    document.getElementById("btnLogin").style.display = "none";
    document.getElementById("areaUsuario").style.display = "block";

    document.getElementById("userNome").innerText = user.displayName;
    document.getElementById("userFoto").src = user.photoURL;
  }
});


// 🔐 LOGIN
window.login = async function() {
  try {
    const result = await signInWithPopup(auth, provider);
    usuario = result.user;
  } catch (error) {
    console.error(error);
    alert(error.message);
  }
}


// 💬 COMENTAR
window.comentar = async function() {
  const texto = document.getElementById("comentario").value;

  if (!usuario) {
    alert("Faça login primeiro!");
    return;
  }

  await addDoc(collection(db, "comentarios"), {
    texto,
    nome: usuario.displayName,
    foto: usuario.photoURL,
    likes: 0,
    data: new Date()
  });

  document.getElementById("comentario").value = "";
  carregar();
}


// 👍 LIKE
window.like = async function(id) {
  const ref = doc(db, "comentarios", id);

  await updateDoc(ref, {
    likes: increment(1)
  });

  carregar();
}


// 💬 RESPONDER
window.responder = async function(id) {
  const texto = prompt("Responder:");

  if (!texto || !usuario) return;

  await addDoc(collection(db, "respostas"), {
    comentarioId: id,
    texto,
    nome: usuario.displayName,
    foto: usuario.photoURL
  });

  carregar();
}


// 🔄 CARREGAR
async function carregar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const comentarios = await getDocs(collection(db, "comentarios"));
  const respostas = await getDocs(collection(db, "respostas"));

  comentarios.forEach((docSnap) => {
    const c = docSnap.data();
    const id = docSnap.id;

    let html = `
      <div class="comentario">
        <div class="usuario">
          <img src="${c.foto}">
          <strong>${c.nome}</strong>
        </div>

        <p>${c.texto}</p>

        <div class="acoes">
          <button onclick="like('${id}')">👍 ${c.likes}</button>
          <button onclick="responder('${id}')">Responder</button>
        </div>

        <div class="respostas">
    `;

    respostas.forEach((rSnap) => {
      const r = rSnap.data();

      if (r.comentarioId === id) {
        html += `
          <div class="usuario">
            <img src="${r.foto}">
            <small><b>${r.nome}</b>: ${r.texto}</small>
          </div>
        `;
      }
    });

    html += `</div></div>`;
    lista.innerHTML += html;
  });
}

carregar();

</script>
</body>
